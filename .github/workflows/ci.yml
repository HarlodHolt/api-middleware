name: CI

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  root:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: AI rules check
        run: npm run ai:rules:check
      - name: PR template check
        if: github.event_name == 'pull_request'
        run: npm run ai:pr:check
      - name: Root CI Checks
        run: npm run test:ci

  api:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install
        run: npm ci
      - name: API Secret-Safe Checks
        run: npm run test:harness -- --scope=api
